name: IVR Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  TF_VERSION: 1.7.5
  PYTHON_VERSION: "3.12"
  WORKING_DIR: terraform/environments/prod

permissions:
  id-token: write   # OIDC
  contents: read
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Lint & Unit Tests
  # ─────────────────────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r tests/requirements.txt
          pip install flake8 black isort mypy boto3 moto

      - name: Lint — flake8
        run: flake8 lambda/ --max-line-length=100 --exclude=.dist

      - name: Lint — black (check only)
        run: black --check lambda/ --line-length=100

      - name: Sort imports check
        run: isort --check-only lambda/ --line-length=100

      - name: Unit tests
        run: |
          cd tests
          python -m pytest unit/ -v --tb=short \
            --junitxml=../test-results/unit.xml \
            --cov=../lambda \
            --cov-report=xml:../test-results/coverage.xml \
            --cov-report=term-missing
        env:
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Terraform Validate & Plan
  # ─────────────────────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform/

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -var="crm_api_endpoint=${{ secrets.CRM_API_ENDPOINT }}" \
            -no-color \
            -out=tfplan \
            2>&1 | tee plan_output.txt
          echo "exitcode=$?" >> $GITHUB_OUTPUT
        working-directory: ${{ env.WORKING_DIR }}
        continue-on-error: true

      - name: Post Plan to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... (truncated)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

      - name: Fail on plan error
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}/tfplan

  # ─────────────────────────────────────────────────────────────
  # JOB 3 — Security Scan
  # ─────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy IaC scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: terraform/
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          soft_fail: false
          output_format: cli
          skip_check: CKV_AWS_115,CKV_AWS_116  # Lambda reserved concurrency — not needed at this scale

  # ─────────────────────────────────────────────────────────────
  # JOB 4 — Deploy (main branch only)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [terraform-plan, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://ap-south-1.console.aws.amazon.com/connect/home

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.WORKING_DIR }}

      - name: Upload contact flows
        run: bash scripts/import-contact-flows.sh prod
        env:
          CONNECT_INSTANCE_ID: ${{ secrets.CONNECT_INSTANCE_ID }}

      - name: Smoke test
        run: |
          cd tests
          pip install -r requirements.txt
          python -m pytest integration/test_smoke.py -v \
            --env=prod \
            --region=${{ env.AWS_REGION }}
        env:
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: Notify deployment
        if: always()
        run: |
          STATUS=${{ job.status }}
          MSG="IVR Platform deployment to *prod* → ${STATUS} :$([ "$STATUS" = "success" ] && echo "white_check_mark" || echo "x"):"
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"${MSG}\"}" || true
